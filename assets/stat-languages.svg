<svg width="560" height="180" viewBox="0 0 560 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Top languages visualization</title>
  <desc id="desc">A compact dark top languages card with six horizontal bars for TypeScript, Python, JavaScript, HTML and CSS, Kotlin, and Other.</desc>
  <defs>
    <linearGradient id="languagesBackgroundGradient" x1="0" y1="0" x2="560" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#060A12"/>
      <stop offset="0.54" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#101111"/>
    </linearGradient>
    <linearGradient id="languagesBorderGradient" x1="0" y1="0" x2="560" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0.38"/>
      <stop offset="0.5" stop-color="#F97316" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#F3EEE4" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="languagesTitleGradient" x1="28" y1="29" x2="190" y2="54" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3EEE4"/>
      <stop offset="0.58" stop-color="#F6B46B"/>
      <stop offset="1" stop-color="#49C7F2"/>
    </linearGradient>
    <linearGradient id="typescriptBarGradient" x1="166" y1="51" x2="258.4" y2="51" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#49C7F2"/>
    </linearGradient>
    <linearGradient id="pythonBarGradient" x1="166" y1="72" x2="238.6" y2="72" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F97316"/>
      <stop offset="1" stop-color="#F6B46B"/>
    </linearGradient>
    <linearGradient id="javascriptBarGradient" x1="166" y1="93" x2="212.2" y2="93" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F1E05A"/>
      <stop offset="1" stop-color="#F3EEE4"/>
    </linearGradient>
    <linearGradient id="htmlCssBarGradient" x1="166" y1="114" x2="205.6" y2="114" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E34F26"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="kotlinBarGradient" x1="166" y1="135" x2="195.7" y2="135" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#C084FC"/>
    </linearGradient>
    <linearGradient id="otherBarGradient" x1="166" y1="156" x2="215.5" y2="156" gradientUnits="userSpaceOnUse">
      <stop stop-color="#64748B"/>
      <stop offset="1" stop-color="#AEBCC8"/>
    </linearGradient>
    <radialGradient id="languagesAmberGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(438 56) rotate(14) scale(180 82)">
      <stop stop-color="#F97316" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#E88A36" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#060A12" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="languagesBlueGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(122 128) rotate(-8) scale(220 88)">
      <stop stop-color="#38BDF8" stop-opacity="0.16"/>
      <stop offset="0.55" stop-color="#0B4B78" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#060A12" stop-opacity="0"/>
    </radialGradient>
    <pattern id="languagesMicroGrid" width="40" height="36" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V36" stroke="#C7D8E4" stroke-opacity="0.035" stroke-width="1"/>
      <circle cx="0" cy="0" r="1" fill="#49C7F2" fill-opacity="0.06"/>
    </pattern>
    <filter id="languagesTextGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.94  0 1 0 0 0.53  0 0 1 0 0.18  0 0 0 0.32 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="560" height="180" rx="8" fill="url(#languagesBackgroundGradient)"/>
  <rect width="560" height="180" rx="8" fill="url(#languagesMicroGrid)" opacity="0.78"/>
  <rect width="560" height="180" rx="8" fill="url(#languagesBlueGlow)"/>
  <rect width="560" height="180" rx="8" fill="url(#languagesAmberGlow)"/>
  <path d="M344 28H431L459 56H526" stroke="#E88A36" stroke-opacity="0.22" stroke-width="1.1"/>
  <path d="M30 151H102L130 123H238" stroke="#49C7F2" stroke-opacity="0.16" stroke-width="1"/>
  <text x="28" y="36" fill="url(#languagesTitleGradient)" filter="url(#languagesTextGlow)" font-family="SFMono-Regular, ui-monospace, monospace" font-size="13" font-weight="750" letter-spacing="2.2">TOP LANGUAGES</text>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12.5" font-weight="650">
    <text x="28" y="55" fill="#AEBCC8" fill-opacity="0.88">TypeScript</text>
    <rect x="166" y="45" width="330" height="10" rx="5" fill="#F3EEE4" fill-opacity="0.055"/>
    <rect x="166" y="45" width="92.4" height="10" rx="5" fill="url(#typescriptBarGradient)"/>
    <text x="526" y="55" text-anchor="end" fill="#8EDCF8" font-family="SFMono-Regular, ui-monospace, monospace" font-size="11" font-weight="700">28%</text>
    <text x="28" y="76" fill="#AEBCC8" fill-opacity="0.88">Python</text>
    <rect x="166" y="66" width="330" height="10" rx="5" fill="#F3EEE4" fill-opacity="0.055"/>
    <rect x="166" y="66" width="72.6" height="10" rx="5" fill="url(#pythonBarGradient)"/>
    <text x="526" y="76" text-anchor="end" fill="#F6B46B" font-family="SFMono-Regular, ui-monospace, monospace" font-size="11" font-weight="700">22%</text>
    <text x="28" y="97" fill="#AEBCC8" fill-opacity="0.88">JavaScript</text>
    <rect x="166" y="87" width="330" height="10" rx="5" fill="#F3EEE4" fill-opacity="0.055"/>
    <rect x="166" y="87" width="46.2" height="10" rx="5" fill="url(#javascriptBarGradient)"/>
    <text x="526" y="97" text-anchor="end" fill="#F1E05A" font-family="SFMono-Regular, ui-monospace, monospace" font-size="11" font-weight="700">14%</text>
    <text x="28" y="118" fill="#AEBCC8" fill-opacity="0.88">HTML/CSS</text>
    <rect x="166" y="108" width="330" height="10" rx="5" fill="#F3EEE4" fill-opacity="0.055"/>
    <rect x="166" y="108" width="39.6" height="10" rx="5" fill="url(#htmlCssBarGradient)"/>
    <text x="526" y="118" text-anchor="end" fill="#F97316" font-family="SFMono-Regular, ui-monospace, monospace" font-size="11" font-weight="700">12%</text>
    <text x="28" y="139" fill="#AEBCC8" fill-opacity="0.88">Kotlin</text>
    <rect x="166" y="129" width="330" height="10" rx="5" fill="#F3EEE4" fill-opacity="0.055"/>
    <rect x="166" y="129" width="29.7" height="10" rx="5" fill="url(#kotlinBarGradient)"/>
    <text x="526" y="139" text-anchor="end" fill="#C084FC" font-family="SFMono-Regular, ui-monospace, monospace" font-size="11" font-weight="700">9%</text>
    <text x="28" y="160" fill="#AEBCC8" fill-opacity="0.88">Other</text>
    <rect x="166" y="150" width="330" height="10" rx="5" fill="#F3EEE4" fill-opacity="0.055"/>
    <rect x="166" y="150" width="49.5" height="10" rx="5" fill="url(#otherBarGradient)"/>
    <text x="526" y="160" text-anchor="end" fill="#AEBCC8" font-family="SFMono-Regular, ui-monospace, monospace" font-size="11" font-weight="700">15%</text>
  </g>
  <rect x="0.5" y="0.5" width="559" height="179" rx="7.5" stroke="url(#languagesBorderGradient)"/>
</svg>
