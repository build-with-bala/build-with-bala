<svg width="1200" height="90" viewBox="0 0 1200 90" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitHub profile trophy strip</title>
  <desc id="desc">A horizontal dark trophy strip with six bordered cards for co-founder, shipped products, repositories, AI builder, open source, and multi-stack achievements.</desc>
  <defs>
    <linearGradient id="trophiesBackgroundGradient" x1="0" y1="0" x2="1200" y2="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#060A12"/>
      <stop offset="0.5" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#101111"/>
    </linearGradient>
    <linearGradient id="trophiesBorderGradient" x1="0" y1="0" x2="1200" y2="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0.30"/>
      <stop offset="0.5" stop-color="#F97316" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#F3EEE4" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="trophyAmberGradient" x1="18" y1="14" x2="198" y2="76" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3EEE4"/>
      <stop offset="0.54" stop-color="#F97316"/>
      <stop offset="1" stop-color="#F6B46B"/>
    </linearGradient>
    <linearGradient id="trophyBlueGradient" x1="213" y1="14" x2="393" y2="76" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3EEE4"/>
      <stop offset="0.56" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#49C7F2"/>
    </linearGradient>
    <linearGradient id="trophyPurpleGradient" x1="408" y1="14" x2="588" y2="76" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3EEE4"/>
      <stop offset="0.56" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#C084FC"/>
    </linearGradient>
    <linearGradient id="trophyGreenGradient" x1="603" y1="14" x2="783" y2="76" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3EEE4"/>
      <stop offset="0.56" stop-color="#34D399"/>
      <stop offset="1" stop-color="#86EFAC"/>
    </linearGradient>
    <linearGradient id="trophyOrangeGradient" x1="798" y1="14" x2="978" y2="76" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3EEE4"/>
      <stop offset="0.54" stop-color="#E88A36"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="trophyPinkGradient" x1="993" y1="14" x2="1173" y2="76" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3EEE4"/>
      <stop offset="0.56" stop-color="#F472B6"/>
      <stop offset="1" stop-color="#F9A8D4"/>
    </linearGradient>
    <radialGradient id="trophiesGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(602 44) scale(660 96)">
      <stop stop-color="#38BDF8" stop-opacity="0.10"/>
      <stop offset="0.45" stop-color="#F97316" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#060A12" stop-opacity="0"/>
    </radialGradient>
    <pattern id="trophiesMicroGrid" width="48" height="40" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V40" stroke="#C7D8E4" stroke-opacity="0.03" stroke-width="1"/>
      <circle cx="0" cy="0" r="1" fill="#49C7F2" fill-opacity="0.06"/>
    </pattern>
    <filter id="trophySoftGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.94  0 1 0 0 0.55  0 0 1 0 0.20  0 0 0 0.36 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="90" rx="8" fill="url(#trophiesBackgroundGradient)"/>
  <rect width="1200" height="90" rx="8" fill="url(#trophiesMicroGrid)" opacity="0.76"/>
  <rect width="1200" height="90" rx="8" fill="url(#trophiesGlow)"/>
  <path d="M64 75H191L224 42H344" stroke="#49C7F2" stroke-opacity="0.12" stroke-width="1"/>
  <path d="M852 20H948L980 52H1140" stroke="#E88A36" stroke-opacity="0.18" stroke-width="1.1"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700">
    <g transform="translate(18 10)">
      <rect width="180" height="70" rx="7" fill="#060A12" fill-opacity="0.58" stroke="url(#trophyAmberGradient)" stroke-opacity="0.50"/>
      <path d="M20 28L27 18L34 28L43 20L39 44H15L11 20L20 28Z" stroke="#F6B46B" stroke-opacity="0.86" stroke-width="1.5" stroke-linejoin="round" filter="url(#trophySoftGlow)"/>
      <path d="M16 50H38" stroke="#F6B46B" stroke-opacity="0.76" stroke-width="1.5" stroke-linecap="round"/>
      <text x="56" y="42" fill="url(#trophyAmberGradient)">Co-founder</text>
    </g>
    <g transform="translate(213 10)">
      <rect width="180" height="70" rx="7" fill="#060A12" fill-opacity="0.58" stroke="url(#trophyBlueGradient)" stroke-opacity="0.50"/>
      <path d="M30 16C42 20 47 32 42 45L32 35L21 46C16 34 19 23 30 16Z" stroke="#49C7F2" stroke-opacity="0.86" stroke-width="1.5" stroke-linejoin="round" filter="url(#trophySoftGlow)"/>
      <path d="M21 46L15 53M32 35L24 27M37 24L41 20" stroke="#49C7F2" stroke-opacity="0.76" stroke-width="1.5" stroke-linecap="round"/>
      <text x="56" y="35" fill="url(#trophyBlueGradient)">Shipped 5+</text>
      <text x="56" y="53" fill="url(#trophyBlueGradient)" font-size="13">Products</text>
    </g>
    <g transform="translate(408 10)">
      <rect width="180" height="70" rx="7" fill="#060A12" fill-opacity="0.58" stroke="url(#trophyPurpleGradient)" stroke-opacity="0.50"/>
      <path d="M13 25H25L30 31H45V49H13V25Z" stroke="#C084FC" stroke-opacity="0.86" stroke-width="1.5" stroke-linejoin="round" filter="url(#trophySoftGlow)"/>
      <path d="M13 34H45" stroke="#C084FC" stroke-opacity="0.68" stroke-width="1.5"/>
      <text x="56" y="35" fill="url(#trophyPurpleGradient)">30+</text>
      <text x="56" y="53" fill="url(#trophyPurpleGradient)" font-size="13">Repositories</text>
    </g>
    <g transform="translate(603 10)">
      <rect width="180" height="70" rx="7" fill="#060A12" fill-opacity="0.58" stroke="url(#trophyGreenGradient)" stroke-opacity="0.50"/>
      <path d="M28 18C20 18 16 24 18 31C13 34 14 43 21 45C22 51 31 53 35 47C43 48 48 39 43 33C47 26 40 18 33 22C32 20 30 18 28 18Z" stroke="#86EFAC" stroke-opacity="0.86" stroke-width="1.4" stroke-linejoin="round" filter="url(#trophySoftGlow)"/>
      <path d="M28 23V47M21 33H35M35 29L42 33M35 40L42 38" stroke="#86EFAC" stroke-opacity="0.68" stroke-width="1.3" stroke-linecap="round"/>
      <text x="56" y="42" fill="url(#trophyGreenGradient)">AI Builder</text>
    </g>
    <g transform="translate(798 10)">
      <rect width="180" height="70" rx="7" fill="#060A12" fill-opacity="0.58" stroke="url(#trophyOrangeGradient)" stroke-opacity="0.50"/>
      <path d="M24 27L14 36L24 45M36 27L46 36L36 45" stroke="#F97316" stroke-opacity="0.86" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" filter="url(#trophySoftGlow)"/>
      <path d="M33 24L27 48" stroke="#F6B46B" stroke-opacity="0.70" stroke-width="1.5" stroke-linecap="round"/>
      <text x="58" y="42" fill="url(#trophyOrangeGradient)">Open Source</text>
    </g>
    <g transform="translate(993 10)">
      <rect width="180" height="70" rx="7" fill="#060A12" fill-opacity="0.58" stroke="url(#trophyPinkGradient)" stroke-opacity="0.50"/>
      <path d="M28 15L45 25L28 35L11 25L28 15Z" stroke="#F9A8D4" stroke-opacity="0.86" stroke-width="1.4" stroke-linejoin="round" filter="url(#trophySoftGlow)"/>
      <path d="M11 36L28 46L45 36M11 47L28 57L45 47" stroke="#F9A8D4" stroke-opacity="0.70" stroke-width="1.4" stroke-linejoin="round"/>
      <text x="58" y="42" fill="url(#trophyPinkGradient)">Multi-Stack</text>
    </g>
  </g>
  <rect x="0.5" y="0.5" width="1199" height="89" rx="7.5" stroke="url(#trophiesBorderGradient)"/>
</svg>
