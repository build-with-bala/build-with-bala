<svg width="560" height="180" viewBox="0 0 560 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Actual impact shipped projects</title>
  <desc id="desc">A dark GitHub profile impact card listing shipped work: InzightED, eCAP at IIM Bodh Gaya, and Ahoum in progress.</desc>
  <defs>
    <linearGradient id="impactBackgroundGradient" x1="0" y1="0" x2="560" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#060A12"/>
      <stop offset="0.54" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#101111"/>
    </linearGradient>
    <linearGradient id="impactBorderGradient" x1="0" y1="0" x2="560" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0.38"/>
      <stop offset="0.5" stop-color="#F97316" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#F3EEE4" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="impactTitleGradient" x1="28" y1="28" x2="184" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3EEE4"/>
      <stop offset="0.58" stop-color="#F6B46B"/>
      <stop offset="1" stop-color="#49C7F2"/>
    </linearGradient>
    <linearGradient id="impactRowGradient" x1="52" y1="60" x2="508" y2="146" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3EEE4" stop-opacity="0.06"/>
      <stop offset="0.55" stop-color="#38BDF8" stop-opacity="0.035"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0.055"/>
    </linearGradient>
    <linearGradient id="impactTraceGradient" x1="26" y1="154" x2="534" y2="121" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0"/>
      <stop offset="0.24" stop-color="#49C7F2" stop-opacity="0.28"/>
      <stop offset="0.58" stop-color="#F97316" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#F3EEE4" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="impactAmberGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(422 52) rotate(14) scale(190 86)">
      <stop stop-color="#F97316" stop-opacity="0.24"/>
      <stop offset="0.55" stop-color="#E88A36" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#060A12" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="impactBlueGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(134 130) rotate(-8) scale(220 90)">
      <stop stop-color="#38BDF8" stop-opacity="0.16"/>
      <stop offset="0.55" stop-color="#0B4B78" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#060A12" stop-opacity="0"/>
    </radialGradient>
    <pattern id="impactMicroGrid" width="40" height="36" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V36" stroke="#C7D8E4" stroke-opacity="0.035" stroke-width="1"/>
      <circle cx="0" cy="0" r="1" fill="#49C7F2" fill-opacity="0.06"/>
    </pattern>
    <filter id="impactTextGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.94  0 1 0 0 0.53  0 0 1 0 0.18  0 0 0 0.32 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="impactDotGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.95  0 1 0 0 0.48  0 0 1 0 0.14  0 0 0 0.52 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="560" height="180" rx="8" fill="url(#impactBackgroundGradient)"/>
  <rect width="560" height="180" rx="8" fill="url(#impactMicroGrid)" opacity="0.78"/>
  <rect width="560" height="180" rx="8" fill="url(#impactBlueGlow)"/>
  <rect width="560" height="180" rx="8" fill="url(#impactAmberGlow)"/>
  <path d="M344 29H430L458 57H528" stroke="#E88A36" stroke-opacity="0.22" stroke-width="1.1"/>
  <text x="28" y="38" fill="url(#impactTitleGradient)" filter="url(#impactTextGlow)" font-family="SFMono-Regular, ui-monospace, monospace" font-size="13" font-weight="750" letter-spacing="2.2">ACTUAL IMPACT</text>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <g transform="translate(28 57)">
      <rect width="504" height="28" rx="7" fill="url(#impactRowGradient)" stroke="#F3EEE4" stroke-opacity="0.06"/>
      <circle cx="14" cy="14" r="4.2" fill="#F97316" filter="url(#impactDotGlow)"/>
      <text x="32" y="18" fill="#F3EEE4" fill-opacity="0.94" font-size="15" font-weight="720">InzightED</text>
      <text x="156" y="18" fill="#AEBCC8" fill-opacity="0.82" font-size="13" font-weight="500">AI evaluation engine · ZAi-Fi flagship</text>
    </g>
    <g transform="translate(28 93)">
      <rect width="504" height="28" rx="7" fill="url(#impactRowGradient)" stroke="#F3EEE4" stroke-opacity="0.06"/>
      <circle cx="14" cy="14" r="4.2" fill="#38BDF8" filter="url(#impactDotGlow)"/>
      <text x="32" y="18" fill="#F3EEE4" fill-opacity="0.94" font-size="15" font-weight="720">eCAP @ IIM-BG</text>
      <text x="178" y="18" fill="#AEBCC8" fill-opacity="0.82" font-size="13" font-weight="500">Live elective allocation portal</text>
    </g>
    <g transform="translate(28 129)">
      <rect width="504" height="28" rx="7" fill="url(#impactRowGradient)" stroke="#F3EEE4" stroke-opacity="0.06"/>
      <circle cx="14" cy="14" r="4.2" fill="#34D399" filter="url(#impactDotGlow)"/>
      <text x="32" y="18" fill="#F3EEE4" fill-opacity="0.94" font-size="15" font-weight="720">Ahoum (in progress)</text>
      <text x="208" y="18" fill="#AEBCC8" fill-opacity="0.82" font-size="13" font-weight="500">Spiritual AI · world-first launch</text>
    </g>
  </g>
  <path d="M28 166C76 153 104 159 144 146C184 133 206 111 250 119C292 126 309 149 354 137C396 126 418 105 462 115C494 123 512 138 534 131" stroke="url(#impactTraceGradient)" stroke-width="1.35"/>
  <g opacity="0.42">
    <path d="M446 143L475 126L504 143V164L475 181L446 164V143Z" stroke="#49C7F2" stroke-opacity="0.28" stroke-width="1"/>
    <path d="M475 126V105M504 143H532M446 164H416" stroke="#E88A36" stroke-opacity="0.16" stroke-width="1"/>
    <circle cx="475" cy="126" r="3" fill="#F6B46B" fill-opacity="0.50"/>
  </g>
  <rect x="0.5" y="0.5" width="559" height="179" rx="7.5" stroke="url(#impactBorderGradient)"/>
</svg>
