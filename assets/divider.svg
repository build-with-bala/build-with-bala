<svg width="1200" height="40" viewBox="0 0 1200 40" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Geometric section divider</title>
  <desc id="desc">A subtle dark section divider with a thin fading amber and blue line and a centered glowing diamond glyph.</desc>
  <defs>
    <linearGradient id="dividerLineGradient" x1="96" y1="20" x2="1104" y2="20" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0"/>
      <stop offset="0.19" stop-color="#38BDF8" stop-opacity="0.34"/>
      <stop offset="0.48" stop-color="#F6B46B" stop-opacity="0.72"/>
      <stop offset="0.52" stop-color="#F6B46B" stop-opacity="0.72"/>
      <stop offset="0.81" stop-color="#38BDF8" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glyphGradient" x1="586" y1="8" x2="616" y2="31" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3EEE4"/>
      <stop offset="0.56" stop-color="#F97316"/>
      <stop offset="1" stop-color="#49C7F2"/>
    </linearGradient>
    <filter id="amberBlueGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.95  0 1 0 0 0.45  0 0 1 0 0.16  0 0 0 0.62 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dividerMicroGrid" width="48" height="40" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V40" stroke="#C7D8E4" stroke-opacity="0.025" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="40" fill="#060A12" fill-opacity="0.18"/>
  <rect width="1200" height="40" fill="url(#dividerMicroGrid)" opacity="0.6"/>
  <path d="M96 20H1104" stroke="url(#dividerLineGradient)" stroke-width="1.2" stroke-linecap="round"/>
  <g filter="url(#amberBlueGlow)">
    <path d="M600 7L614 20L600 33L586 20L600 7Z" fill="#060A12" stroke="url(#glyphGradient)" stroke-width="1.4"/>
    <path d="M600 13L607 20L600 27L593 20L600 13Z" fill="url(#glyphGradient)" fill-opacity="0.22" stroke="#F3EEE4" stroke-opacity="0.18" stroke-width="0.8"/>
    <circle cx="600" cy="20" r="2.3" fill="#F6B46B"/>
  </g>
</svg>
