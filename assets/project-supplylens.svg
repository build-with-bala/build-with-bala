<svg width="480" height="180" viewBox="0 0 480 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">supplylens project card</title>
  <desc id="desc">A dark project card for supplylens with globe arc patterns, amber and blue glows, tags, and an external link glyph.</desc>
  <defs>
    <linearGradient id="cardBackgroundGradient" x1="0" y1="0" x2="480" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#060A12"/>
      <stop offset="0.55" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#101111"/>
    </linearGradient>
    <radialGradient id="cardAmberGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(358 58) rotate(18) scale(178 86)">
      <stop stop-color="#F97316" stop-opacity="0.24"/>
      <stop offset="0.5" stop-color="#E88A36" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#060A12" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cardBlueGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(112 124) rotate(-8) scale(222 98)">
      <stop stop-color="#38BDF8" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#0B4B78" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#060A12" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGradient" x1="28" y1="46" x2="228" y2="77" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3EEE4"/>
      <stop offset="0.58" stop-color="#F6B46B"/>
      <stop offset="1" stop-color="#49C7F2"/>
    </linearGradient>
    <linearGradient id="borderGradient" x1="0" y1="0" x2="480" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0.40"/>
      <stop offset="0.5" stop-color="#F97316" stop-opacity="0.46"/>
      <stop offset="1" stop-color="#F3EEE4" stop-opacity="0.10"/>
    </linearGradient>
    <pattern id="globeArcPattern" width="170" height="120" patternUnits="userSpaceOnUse">
      <path d="M20 60C48 16 122 16 150 60C122 104 48 104 20 60Z" stroke="#38BDF8" stroke-opacity="0.065" stroke-width="1" fill="none"/>
      <path d="M85 18C68 42 68 78 85 102M85 18C102 42 102 78 85 102M24 60H146" stroke="#F6B46B" stroke-opacity="0.055" stroke-width="1" fill="none"/>
    </pattern>
    <filter id="textGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.93  0 1 0 0 0.52  0 0 1 0 0.18  0 0 0 0.34 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="480" height="180" rx="8" fill="url(#cardBackgroundGradient)"/>
  <rect width="480" height="180" rx="8" fill="url(#globeArcPattern)" opacity="0.95"/>
  <rect width="480" height="180" rx="8" fill="url(#cardBlueGlow)"/>
  <rect width="480" height="180" rx="8" fill="url(#cardAmberGlow)"/>
  <path d="M327 32C351 16 418 17 445 58C417 100 351 101 327 84C346 67 346 49 327 32Z" stroke="#38BDF8" stroke-opacity="0.20" stroke-width="1.1" fill="none"/>
  <path d="M386 19C373 42 373 76 386 99M333 58H444" stroke="#F6B46B" stroke-opacity="0.17" stroke-width="1" fill="none"/>
  <text x="28" y="62" fill="url(#titleGradient)" filter="url(#textGlow)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="700">supplylens</text>
  <text x="29" y="91" fill="#AEBCC8" fill-opacity="0.82" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="500">Real-time logistics situational-awareness cockpit</text>
  <g font-family="SFMono-Regular, ui-monospace, monospace" font-size="11" font-weight="500">
    <rect x="28" y="124" width="63" height="24" rx="6" fill="#F97316" fill-opacity="0.11" stroke="#F6B46B" stroke-opacity="0.28"/>
    <text x="41" y="140" fill="#F6B46B">gemini</text>
    <rect x="99" y="124" width="105" height="24" rx="6" fill="#38BDF8" fill-opacity="0.09" stroke="#49C7F2" stroke-opacity="0.25"/>
    <text x="112" y="140" fill="#8EDCF8">fleet-tracking</text>
    <rect x="212" y="124" width="126" height="24" rx="6" fill="#F97316" fill-opacity="0.11" stroke="#F6B46B" stroke-opacity="0.30"/>
    <text x="225" y="140" fill="#F6B46B">disruption-radar</text>
  </g>
  <g transform="translate(421 125)" stroke="#F3EEE4" stroke-opacity="0.72" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M7 32H31C34 32 36 30 36 27V13"/>
    <path d="M18 7H36V25"/>
    <path d="M17 26L36 7"/>
  </g>
  <rect x="0.5" y="0.5" width="479" height="179" rx="7.5" stroke="url(#borderGradient)"/>
</svg>
