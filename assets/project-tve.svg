<svg width="480" height="180" viewBox="0 0 480 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">transparent-video-encoder project card</title>
  <desc id="desc">A dark project card for transparent-video-encoder with a pixel grid, amber and blue glows, tags, and an external link glyph.</desc>
  <defs>
    <linearGradient id="cardBackgroundGradient" x1="0" y1="0" x2="480" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#060A12"/>
      <stop offset="0.56" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#101111"/>
    </linearGradient>
    <radialGradient id="cardAmberGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(366 60) rotate(18) scale(178 86)">
      <stop stop-color="#F97316" stop-opacity="0.25"/>
      <stop offset="0.5" stop-color="#E88A36" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#060A12" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cardBlueGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(108 124) rotate(-8) scale(222 98)">
      <stop stop-color="#38BDF8" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#0B4B78" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#060A12" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGradient" x1="28" y1="46" x2="368" y2="77" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3EEE4"/>
      <stop offset="0.58" stop-color="#F6B46B"/>
      <stop offset="1" stop-color="#49C7F2"/>
    </linearGradient>
    <linearGradient id="borderGradient" x1="0" y1="0" x2="480" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0.40"/>
      <stop offset="0.5" stop-color="#F97316" stop-opacity="0.46"/>
      <stop offset="1" stop-color="#F3EEE4" stop-opacity="0.10"/>
    </linearGradient>
    <pattern id="pixelPattern" width="28" height="28" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="5" height="5" fill="#38BDF8" fill-opacity="0.07"/>
      <rect x="14" y="14" width="4" height="4" fill="#F6B46B" fill-opacity="0.06"/>
      <path d="M28 0H0V28" stroke="#C7D8E4" stroke-opacity="0.028" stroke-width="1"/>
    </pattern>
    <filter id="textGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.93  0 1 0 0 0.52  0 0 1 0 0.18  0 0 0 0.34 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="480" height="180" rx="8" fill="url(#cardBackgroundGradient)"/>
  <rect width="480" height="180" rx="8" fill="url(#pixelPattern)" opacity="0.95"/>
  <rect width="480" height="180" rx="8" fill="url(#cardBlueGlow)"/>
  <rect width="480" height="180" rx="8" fill="url(#cardAmberGlow)"/>
  <g opacity="0.72">
    <rect x="335" y="35" width="20" height="20" fill="#38BDF8" fill-opacity="0.12" stroke="#49C7F2" stroke-opacity="0.24"/>
    <rect x="361" y="35" width="20" height="20" fill="#F97316" fill-opacity="0.12" stroke="#F6B46B" stroke-opacity="0.22"/>
    <rect x="387" y="35" width="20" height="20" fill="#F3EEE4" fill-opacity="0.07" stroke="#F3EEE4" stroke-opacity="0.12"/>
    <rect x="361" y="61" width="20" height="20" fill="#38BDF8" fill-opacity="0.10" stroke="#49C7F2" stroke-opacity="0.20"/>
    <rect x="387" y="61" width="20" height="20" fill="#F97316" fill-opacity="0.10" stroke="#F6B46B" stroke-opacity="0.20"/>
  </g>
  <text x="28" y="62" fill="url(#titleGradient)" filter="url(#textGlow)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="25" font-weight="700">transparent-video-encoder</text>
  <text x="29" y="91" fill="#AEBCC8" fill-opacity="0.82" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500">CLI for HEVC alpha + VP9 alpha + transparent posters</text>
  <g font-family="SFMono-Regular, ui-monospace, monospace" font-size="11" font-weight="500">
    <rect x="28" y="124" width="45" height="24" rx="6" fill="#F97316" fill-opacity="0.11" stroke="#F6B46B" stroke-opacity="0.28"/>
    <text x="41" y="140" fill="#F6B46B">cli</text>
    <rect x="81" y="124" width="125" height="24" rx="6" fill="#38BDF8" fill-opacity="0.09" stroke="#49C7F2" stroke-opacity="0.25"/>
    <text x="94" y="140" fill="#8EDCF8">video-processing</text>
    <rect x="214" y="124" width="132" height="24" rx="6" fill="#F97316" fill-opacity="0.11" stroke="#F6B46B" stroke-opacity="0.30"/>
    <text x="227" y="140" fill="#F6B46B">rembg-integration</text>
  </g>
  <g transform="translate(421 125)" stroke="#F3EEE4" stroke-opacity="0.72" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M7 32H31C34 32 36 30 36 27V13"/>
    <path d="M18 7H36V25"/>
    <path d="M17 26L36 7"/>
  </g>
  <rect x="0.5" y="0.5" width="479" height="179" rx="7.5" stroke="url(#borderGradient)"/>
</svg>
