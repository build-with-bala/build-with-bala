<svg width="1000" height="1000" viewBox="0 0 1000 1000" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Build With Bala GitHub profile avatar</title>
  <desc id="desc">A circular dark cyberpunk founder brand mark with a bold BB monogram, amber and electric blue circuit accents, and a cream to amber to blue gradient.</desc>

  <defs>
    <radialGradient id="bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(500 500) rotate(90) scale(610)">
      <stop offset="0" stop-color="#111B2B"/>
      <stop offset="0.54" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#060A12"/>
    </radialGradient>

    <radialGradient id="amberGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(640 392) rotate(42) scale(410)">
      <stop stop-color="#F97316" stop-opacity="0.38"/>
      <stop offset="0.44" stop-color="#F97316" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#0D1117" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="blueGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(350 610) rotate(-28) scale(430)">
      <stop stop-color="#38BDF8" stop-opacity="0.31"/>
      <stop offset="0.42" stop-color="#1BA6D9" stop-opacity="0.11"/>
      <stop offset="1" stop-color="#0D1117" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="markGradient" x1="270" y1="280" x2="735" y2="728" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3EEE4"/>
      <stop offset="0.48" stop-color="#F97316"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>

    <linearGradient id="strokeGradient" x1="150" y1="170" x2="850" y2="828" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3EEE4" stop-opacity="0.22"/>
      <stop offset="0.48" stop-color="#F97316" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0.72"/>
    </linearGradient>

    <linearGradient id="traceAmber" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#F97316" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#F97316" stop-opacity="0.86"/>
      <stop offset="1" stop-color="#F7B36A" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="traceBlue" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#38BDF8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#38BDF8" stop-opacity="0.84"/>
      <stop offset="1" stop-color="#68C8F7" stop-opacity="0"/>
    </linearGradient>

    <pattern id="microGrid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0H0V50" stroke="#C7D8E4" stroke-opacity="0.038" stroke-width="1"/>
      <circle cx="0" cy="0" r="1.35" fill="#38BDF8" fill-opacity="0.08"/>
    </pattern>

    <filter id="markGlow" x="-22%" y="-22%" width="144%" height="144%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.95  0 0 0 0 0.50  0 0 0 0 0.16  0 0 0 0.62 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="blueSoftGlow" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur stdDeviation="11" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.22  0 0 0 0 0.74  0 0 0 0 0.97  0 0 0 0.7 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="amberSoftGlow" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur stdDeviation="11" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.98  0 0 0 0 0.45  0 0 0 0 0.09  0 0 0 0.78 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="safeCircle">
      <circle cx="500" cy="500" r="500"/>
    </clipPath>
  </defs>

  <g clip-path="url(#safeCircle)">
    <rect width="1000" height="1000" fill="url(#bg)"/>
    <rect width="1000" height="1000" fill="url(#microGrid)"/>
    <rect width="1000" height="1000" fill="url(#amberGlow)"/>
    <rect width="1000" height="1000" fill="url(#blueGlow)"/>

    <path d="M-40 733C96 674 202 706 329 660C458 613 518 509 648 529C762 546 820 632 955 607C1042 591 1098 552 1142 527V1040H-40V733Z" fill="#05080D" fill-opacity="0.36"/>
    <path d="M-20 196C128 173 226 202 341 183C482 159 593 107 746 135C854 155 927 196 1028 175" stroke="#FFFFFF" stroke-opacity="0.055" stroke-width="1.3"/>
    <path d="M14 821C159 753 300 774 429 727C557 681 611 586 735 600C837 612 897 676 1015 651" stroke="#F97316" stroke-opacity="0.15" stroke-width="1.8"/>

    <circle cx="500" cy="500" r="392" stroke="#F3EEE4" stroke-opacity="0.055" stroke-width="2"/>
    <circle cx="500" cy="500" r="346" stroke="url(#strokeGradient)" stroke-opacity="0.62" stroke-width="8"/>
    <circle cx="500" cy="500" r="302" stroke="#38BDF8" stroke-opacity="0.12" stroke-width="2"/>
    <circle cx="500" cy="500" r="238" fill="#070B13" fill-opacity="0.5" stroke="#F3EEE4" stroke-opacity="0.065" stroke-width="1"/>

    <g opacity="0.9">
      <path d="M145 410H252L304 358H374" stroke="url(#traceBlue)" stroke-width="4" stroke-linecap="round"/>
      <path d="M164 593H272L326 647H401" stroke="url(#traceAmber)" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M626 354H704L757 407H856" stroke="url(#traceAmber)" stroke-width="4" stroke-linecap="round"/>
      <path d="M603 653H710L764 599H842" stroke="url(#traceBlue)" stroke-width="4.5" stroke-linecap="round"/>
      <circle cx="252" cy="410" r="10" fill="#38BDF8" fill-opacity="0.78" filter="url(#blueSoftGlow)"/>
      <circle cx="326" cy="647" r="10" fill="#F97316" fill-opacity="0.84" filter="url(#amberSoftGlow)"/>
      <circle cx="757" cy="407" r="10" fill="#F97316" fill-opacity="0.8" filter="url(#amberSoftGlow)"/>
      <circle cx="764" cy="599" r="10" fill="#38BDF8" fill-opacity="0.78" filter="url(#blueSoftGlow)"/>
      <circle cx="374" cy="358" r="6" fill="#38BDF8" fill-opacity="0.58"/>
      <circle cx="401" cy="647" r="6" fill="#F97316" fill-opacity="0.58"/>
      <circle cx="626" cy="354" r="6" fill="#F97316" fill-opacity="0.54"/>
      <circle cx="603" cy="653" r="6" fill="#38BDF8" fill-opacity="0.54"/>
    </g>

    <g opacity="0.52">
      <path d="M500 113L535 148L500 183L465 148L500 113Z" stroke="#F97316" stroke-opacity="0.45" stroke-width="2"/>
      <path d="M500 113V70M500 183V238M465 148H413M535 148H589" stroke="#F97316" stroke-opacity="0.18" stroke-width="2"/>
      <path d="M500 817L535 852L500 887L465 852L500 817Z" stroke="#38BDF8" stroke-opacity="0.45" stroke-width="2"/>
      <path d="M500 817V762M500 887V930M465 852H411M535 852H587" stroke="#38BDF8" stroke-opacity="0.18" stroke-width="2"/>
    </g>

    <g filter="url(#markGlow)">
      <path fill-rule="evenodd" clip-rule="evenodd" d="M304 259H496C555.4 259 601.6 272.4 634.6 299.2C667.5 326 684 362.2 684 407.8C684 435.8 677.1 459.8 663.2 479.8C649.4 499.8 629.6 515.2 603.8 526C637.2 535 662.3 550.7 679.2 573.2C696.1 595.7 704.5 622.9 704.5 654.8C704.5 707.5 685.5 749 647.4 779.3C609.3 809.6 557.2 824.8 491.2 824.8H304V259ZM423 365.5V486.8H494.5C517.3 486.8 534.8 481.4 547 470.6C559.2 459.8 565.3 444.2 565.3 423.8C565.3 404.7 558.9 390.2 546.2 380.2C533.5 370.4 515.1 365.5 491 365.5H423ZM423 585.7V718.2H505.2C530.4 718.2 549.9 712.5 563.7 701C577.6 689.4 584.5 672.7 584.5 650.8C584.5 629.2 577.2 613 562.5 602.2C547.9 591.2 526.5 585.7 498.4 585.7H423Z" fill="url(#markGradient)"/>
      <path d="M423 310V774" stroke="#060A12" stroke-opacity="0.36" stroke-width="18" stroke-linecap="round"/>
      <path d="M447 391H494C511.4 391 524.2 394.1 532.3 400.5C540.4 406.9 544.5 416.5 544.5 429.2C544.5 442.3 540.5 452.2 532.6 459C524.6 465.8 511.8 469.2 494.1 469.2H447V391Z" fill="#0D1117" fill-opacity="0.72"/>
      <path d="M447 611.5H501.2C522 611.5 537.3 615.2 547.1 622.6C557 630 561.9 641.4 561.9 656.8C561.9 672.2 557.1 684.1 547.4 692.2C537.7 700.3 523.1 704.3 503.6 704.3H447V611.5Z" fill="#0D1117" fill-opacity="0.72"/>
    </g>

    <g opacity="0.36">
      <path d="M781 245C744 260 714 282 691 311M719 218C696 242 680 266 671 292M807 717C767 700 733 677 704 647M738 780C712 752 693 722 681 690" stroke="#8FA8B8" stroke-opacity="0.62" stroke-width="2" stroke-linecap="round"/>
      <circle cx="781" cy="245" r="5" fill="#F97316" fill-opacity="0.45"/>
      <circle cx="719" cy="218" r="4.5" fill="#38BDF8" fill-opacity="0.42"/>
      <circle cx="807" cy="717" r="5" fill="#38BDF8" fill-opacity="0.42"/>
      <circle cx="738" cy="780" r="4.5" fill="#F97316" fill-opacity="0.45"/>
    </g>

    <circle cx="500" cy="500" r="498" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="2"/>
    <rect width="1000" height="1000" fill="black" opacity="0.025"/>
  </g>
</svg>
