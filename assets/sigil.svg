<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Build With Bala sigil</title>
  <desc id="desc">A circular dark badge with a high-contrast stylized B monogram in cream, amber, and electric blue.</desc>
  <defs>
    <radialGradient id="sigilBackgroundGradient" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(39 29) rotate(45) scale(96)">
      <stop stop-color="#111B2A"/>
      <stop offset="0.52" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#060A12"/>
    </radialGradient>
    <linearGradient id="sigilTitleGradient" x1="30" y1="25" x2="91" y2="93" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3EEE4"/>
      <stop offset="0.52" stop-color="#F97316"/>
      <stop offset="1" stop-color="#49C7F2"/>
    </linearGradient>
    <linearGradient id="sigilRingGradient" x1="18" y1="22" x2="102" y2="99" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0.72"/>
      <stop offset="0.52" stop-color="#F6B46B" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0.38"/>
    </linearGradient>
    <pattern id="sigilMicroGrid" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M18 0H0V18" stroke="#C7D8E4" stroke-opacity="0.045" stroke-width="1"/>
      <circle cx="0" cy="0" r="1" fill="#49C7F2" fill-opacity="0.08"/>
    </pattern>
    <filter id="sigilSoftGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.93  0 1 0 0 0.54  0 0 1 0 0.21  0 0 0 0.58 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="sigilClip">
      <circle cx="60" cy="60" r="52"/>
    </clipPath>
  </defs>
  <rect width="120" height="120" rx="26" fill="#060A12"/>
  <circle cx="60" cy="60" r="54" fill="url(#sigilBackgroundGradient)" stroke="url(#sigilRingGradient)" stroke-width="1.5"/>
  <g clip-path="url(#sigilClip)">
    <rect x="8" y="8" width="104" height="104" fill="url(#sigilMicroGrid)" opacity="0.68"/>
    <circle cx="34" cy="31" r="34" fill="#38BDF8" fill-opacity="0.10"/>
    <circle cx="85" cy="80" r="42" fill="#F97316" fill-opacity="0.12"/>
  </g>
  <path d="M42 28V92" stroke="url(#sigilTitleGradient)" stroke-width="10" stroke-linecap="round" filter="url(#sigilSoftGlow)"/>
  <path d="M45 30H66C79 30 87 37 87 48C87 58 80 64 67 64H45V30Z" fill="none" stroke="url(#sigilTitleGradient)" stroke-width="9" stroke-linejoin="round" filter="url(#sigilSoftGlow)"/>
  <path d="M45 57H70C84 57 93 64 93 76C93 88 84 94 68 94H45V57Z" fill="none" stroke="url(#sigilTitleGradient)" stroke-width="9" stroke-linejoin="round" filter="url(#sigilSoftGlow)"/>
  <path d="M49 46H68M49 76H70" stroke="#060A12" stroke-opacity="0.72" stroke-width="4" stroke-linecap="round"/>
  <circle cx="60" cy="60" r="43" stroke="#F3EEE4" stroke-opacity="0.08" stroke-width="1"/>
</svg>
