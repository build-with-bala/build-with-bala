<svg width="480" height="180" viewBox="0 0 480 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">prep-lab project card</title>
  <desc id="desc">A dark project card for prep-lab with waveform lines, amber and blue glows, tags, and an external link glyph.</desc>
  <defs>
    <linearGradient id="cardBackgroundGradient" x1="0" y1="0" x2="480" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#060A12"/>
      <stop offset="0.56" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#101111"/>
    </linearGradient>
    <radialGradient id="cardAmberGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(364 62) rotate(14) scale(176 82)">
      <stop stop-color="#F97316" stop-opacity="0.25"/>
      <stop offset="0.52" stop-color="#E88A36" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#060A12" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cardBlueGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(102 116) rotate(-8) scale(220 96)">
      <stop stop-color="#38BDF8" stop-opacity="0.17"/>
      <stop offset="0.55" stop-color="#0B4B78" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#060A12" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGradient" x1="28" y1="46" x2="196" y2="76" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3EEE4"/>
      <stop offset="0.58" stop-color="#F6B46B"/>
      <stop offset="1" stop-color="#49C7F2"/>
    </linearGradient>
    <linearGradient id="borderGradient" x1="0" y1="0" x2="480" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0.38"/>
      <stop offset="0.5" stop-color="#F97316" stop-opacity="0.46"/>
      <stop offset="1" stop-color="#F3EEE4" stop-opacity="0.10"/>
    </linearGradient>
    <pattern id="waveformPattern" width="180" height="70" patternUnits="userSpaceOnUse">
      <path d="M0 38C18 18 35 18 52 38C69 58 86 58 104 38C121 18 139 18 157 38C166 48 173 53 180 54" stroke="#38BDF8" stroke-opacity="0.075" stroke-width="1.2" fill="none"/>
      <path d="M0 52C22 34 43 34 64 52C85 70 105 70 126 52C147 34 164 36 180 47" stroke="#F6B46B" stroke-opacity="0.07" stroke-width="1" fill="none"/>
    </pattern>
    <filter id="textGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.93  0 1 0 0 0.52  0 0 1 0 0.18  0 0 0 0.34 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="480" height="180" rx="8" fill="url(#cardBackgroundGradient)"/>
  <rect width="480" height="180" rx="8" fill="url(#waveformPattern)" opacity="0.95"/>
  <rect width="480" height="180" rx="8" fill="url(#cardBlueGlow)"/>
  <rect width="480" height="180" rx="8" fill="url(#cardAmberGlow)"/>
  <path d="M292 40C316 26 338 28 360 45C382 62 406 62 438 39" stroke="#38BDF8" stroke-opacity="0.22" stroke-width="1.2" fill="none"/>
  <path d="M34 119C58 103 83 105 109 122C135 139 164 136 190 111" stroke="#E88A36" stroke-opacity="0.22" stroke-width="1.2" fill="none"/>
  <text x="28" y="62" fill="url(#titleGradient)" filter="url(#textGlow)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="700">prep-lab</text>
  <text x="29" y="91" fill="#AEBCC8" fill-opacity="0.82" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="500">Open-source exam-agnostic CBT platform</text>
  <g font-family="SFMono-Regular, ui-monospace, monospace" font-size="11" font-weight="500">
    <rect x="28" y="124" width="91" height="24" rx="6" fill="#F97316" fill-opacity="0.11" stroke="#F6B46B" stroke-opacity="0.28"/>
    <text x="41" y="140" fill="#F6B46B">open-source</text>
    <rect x="127" y="124" width="105" height="24" rx="6" fill="#38BDF8" fill-opacity="0.09" stroke="#49C7F2" stroke-opacity="0.25"/>
    <text x="140" y="140" fill="#8EDCF8">llm-evaluation</text>
    <rect x="240" y="124" width="88" height="24" rx="6" fill="#F97316" fill-opacity="0.11" stroke="#F6B46B" stroke-opacity="0.30"/>
    <text x="253" y="140" fill="#F6B46B">in-progress</text>
  </g>
  <g transform="translate(421 125)" stroke="#F3EEE4" stroke-opacity="0.72" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M7 32H31C34 32 36 30 36 27V13"/>
    <path d="M18 7H36V25"/>
    <path d="M17 26L36 7"/>
  </g>
  <rect x="0.5" y="0.5" width="479" height="179" rx="7.5" stroke="url(#borderGradient)"/>
</svg>
