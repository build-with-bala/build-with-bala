<svg width="480" height="180" viewBox="0 0 480 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">clan-conqueror-central project card</title>
  <desc id="desc">A dark project card for clan-conqueror-central with a hexagonal grid, amber and blue glows, tags, and an external link glyph.</desc>
  <defs>
    <linearGradient id="cardBackgroundGradient" x1="0" y1="0" x2="480" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#060A12"/>
      <stop offset="0.56" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#101111"/>
    </linearGradient>
    <radialGradient id="cardAmberGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(358 62) rotate(18) scale(178 86)">
      <stop stop-color="#F97316" stop-opacity="0.25"/>
      <stop offset="0.5" stop-color="#E88A36" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#060A12" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cardBlueGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(108 124) rotate(-8) scale(222 98)">
      <stop stop-color="#38BDF8" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#0B4B78" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#060A12" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGradient" x1="28" y1="46" x2="344" y2="77" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3EEE4"/>
      <stop offset="0.58" stop-color="#F6B46B"/>
      <stop offset="1" stop-color="#49C7F2"/>
    </linearGradient>
    <linearGradient id="borderGradient" x1="0" y1="0" x2="480" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0.40"/>
      <stop offset="0.5" stop-color="#F97316" stop-opacity="0.46"/>
      <stop offset="1" stop-color="#F3EEE4" stop-opacity="0.10"/>
    </linearGradient>
    <pattern id="hexPattern" width="72" height="62" patternUnits="userSpaceOnUse">
      <path d="M18 1L36 11V32L18 42L0 32V11L18 1ZM54 20L72 30V51L54 61L36 51V30L54 20Z" stroke="#38BDF8" stroke-opacity="0.055" stroke-width="1" fill="none"/>
      <path d="M18 42V61M36 32L54 20M36 51L18 61" stroke="#F6B46B" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <filter id="textGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.93  0 1 0 0 0.52  0 0 1 0 0.18  0 0 0 0.34 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="480" height="180" rx="8" fill="url(#cardBackgroundGradient)"/>
  <rect width="480" height="180" rx="8" fill="url(#hexPattern)" opacity="0.96"/>
  <rect width="480" height="180" rx="8" fill="url(#cardBlueGlow)"/>
  <rect width="480" height="180" rx="8" fill="url(#cardAmberGlow)"/>
  <path d="M371 31L403 49V86L371 104L339 86V49L371 31Z" stroke="#F6B46B" stroke-opacity="0.22" stroke-width="1.2"/>
  <path d="M371 31V14M403 49L428 35M403 86L426 99M371 104V128M339 86L317 100M339 49L316 36" stroke="#38BDF8" stroke-opacity="0.16" stroke-width="1"/>
  <text x="28" y="62" fill="url(#titleGradient)" filter="url(#textGlow)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="700">clan-conqueror-central</text>
  <text x="29" y="91" fill="#AEBCC8" fill-opacity="0.82" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="500">IIM-BG Clash of Clans event portal</text>
  <g font-family="SFMono-Regular, ui-monospace, monospace" font-size="11" font-weight="500">
    <rect x="28" y="124" width="64" height="24" rx="6" fill="#F97316" fill-opacity="0.11" stroke="#F6B46B" stroke-opacity="0.28"/>
    <text x="41" y="140" fill="#F6B46B">campus</text>
    <rect x="100" y="124" width="60" height="24" rx="6" fill="#38BDF8" fill-opacity="0.09" stroke="#49C7F2" stroke-opacity="0.25"/>
    <text x="113" y="140" fill="#8EDCF8">sports</text>
    <rect x="168" y="124" width="91" height="24" rx="6" fill="#F97316" fill-opacity="0.11" stroke="#F6B46B" stroke-opacity="0.30"/>
    <text x="181" y="140" fill="#F6B46B">public-repo</text>
  </g>
  <g transform="translate(421 125)" stroke="#F3EEE4" stroke-opacity="0.72" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M7 32H31C34 32 36 30 36 27V13"/>
    <path d="M18 7H36V25"/>
    <path d="M17 26L36 7"/>
  </g>
  <rect x="0.5" y="0.5" width="479" height="179" rx="7.5" stroke="url(#borderGradient)"/>
</svg>
